name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Cachear Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Buildozer
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython virtualenv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Limpiar compilación anterior
        run: |
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf .buildozer/android/platform/build-*

      - name: Compilar APK
        env:
          ACCEPT_SDK_LICENSE: "yes"
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          buildozer -v android debug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: digitalizacion-agua-apk
          path: bin/*.apk
          if-no-files-found: error
