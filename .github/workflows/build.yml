name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            autoconf \
            automake \
            autopoint \
            gettext \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Fijar restricción global de pip (bloquea auto-actualizaciones rotas)
        run: |
          echo "pip==24.0" > "$HOME/pip-constraints.txt"
          echo "PIP_CONSTRAINT=$HOME/pip-constraints.txt" >> "$GITHUB_ENV"

      - name: Instalar Buildozer
        run: |
          python3 -m pip install --user "pip==24.0" setuptools wheel
          python3 -m pip install --user buildozer cython==0.29.36
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"         
          
      - name: Cachear build de Buildozer (evita recrear el entorno de pip cada vez)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Compilar APK
        env:
          VIRTUALENV_PIP: "24.0"
        run: |
          yes | buildozer -v android debug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: digitalizacion-agua-apk
          path: bin/*.apk
          if-no-files-found: error
