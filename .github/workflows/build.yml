name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Cachear Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-venv \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache

      - name: Crear entorno Python
        run: |
          python3 -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Instalar Buildozer
        run: |
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install buildozer cython==0.29.36

      - name: Compilar APK
        env:
          ACCEPT_SDK_LICENSE: "yes"
        run: |
          .venv/bin/buildozer android debug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: digitalizacion-agua-apk
          path: bin/*.apk
          if-no-files-found: error
